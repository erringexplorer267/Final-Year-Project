<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNC Live Data Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0b0e14;
            --panel-bg: rgba(20, 24, 34, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-green: #00ff66;
            --accent-glow: rgba(0, 255, 102, 0.3);
            --text-main: #f8f9fa;
            --text-muted: #8b949e;
            --card-radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 10% 40%, rgba(0, 255, 102, 0.06), transparent 30%),
                radial-gradient(circle at 90% 60%, rgba(0, 255, 102, 0.04), transparent 30%);
            color: var(--text-main); 
            display: flex; 
            height: 100vh; 
            overflow: hidden;
        }

        .sidebar { 
            width: 380px; 
            background: var(--panel-bg); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 32px 28px; 
            border-right: 1px solid var(--border-color); 
            display: flex; 
            flex-direction: column; 
            gap: 24px; 
            box-shadow: 4px 0 24px rgba(0,0,0,0.3);
            z-index: 10;
        }

        .sidebar h2 {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            color: var(--text-main);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar h2::before {
            content: '';
            display: inline-block;
            width: 10px;
            height: 10px;
            background: var(--accent-green);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--accent-glow);
        }

        .main { 
            flex-grow: 1; 
            padding: 40px; 
            overflow-y: auto; 
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .main h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 32px;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .card { 
            background: rgba(255, 255, 255, 0.02); 
            padding: 24px; 
            border-radius: var(--card-radius); 
            border: 1px solid var(--border-color);
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
        }

        .card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--accent-green);
            border-radius: 4px 0 0 4px;
            box-shadow: 2px 0 12px var(--accent-glow);
        }

        .card:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.04);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        .card label {
            display: block;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 12px;
            font-weight: 600;
        }

        .value { 
            font-size: 3rem; 
            color: var(--text-main); 
            font-family: 'JetBrains Mono', monospace; 
            font-weight: 700;
            line-height: 1;
            color: var(--accent-green);
        }

        .chart-container { 
            background: rgba(255, 255, 255, 0.02); 
            padding: 24px; 
            border-radius: var(--card-radius); 
            border: 1px solid var(--border-color);
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            min-height: 300px;
        }

        .chart-header {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 16px;
            font-weight: 600;
        }

        .chart-wrapper {
            position: relative;
            flex-grow: 1;
            width: 100%;
            min-height: 0;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 960px;
            border-radius: var(--card-radius);
            padding: 10px;
            background: rgba(20, 24, 34, 0.8);
            border: 1px solid var(--border-color);
            box-shadow: 0 24px 48px rgba(0,0,0,0.5);
        }

        .video-wrapper::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px; right: -1px; bottom: -1px;
            border-radius: calc(var(--card-radius) + 1px);
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent 50%, rgba(255,255,255,0.05));
            z-index: -1;
        }

        img { 
            width: 100%; 
            height: auto;
            border-radius: calc(var(--card-radius) - 6px); 
            display: block;
            background: #000;
        }

        .status-text {
            color: var(--text-muted);
            margin-top: 24px;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.03);
            padding: 12px 20px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
        }

        .status-text i {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--accent-green);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-glow);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>CNC Monitor</h2>
        <div class="card">
            <label>Meter Reading</label>
            <div id="meter-val" class="value">0</div>
        </div>
        <div class="card">
            <label>Current Gain</label>
            <div id="gain-val" class="value">0</div>
        </div>
        <div class="chart-container">
            <div class="chart-header">Live Gain Analysis</div>
            <div class="chart-wrapper">
                <canvas id="liveChart"></canvas>
            </div>
        </div>
    </div>

    <div class="main">
        <h1>Vision System Feed</h1>
        <div class="video-wrapper">
            <img src="{{ url_for('video_feed') }}" alt="Vision Feed">
        </div>
        <p class="status-text">
            <i></i> Ensure reading is inside the green box for plotting.
        </p>
    </div>

    <script>
        // 1. Initialize the Chart
        const ctx = document.getElementById('liveChart').getContext('2d');
        const liveChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [], // Time stamps
                datasets: [{
                    label: 'Gain Value',
                    data: [], // Live Gain values
                    borderColor: '#00ff66',
                    backgroundColor: 'rgba(0, 255, 102, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.4 // Makes the line curvy
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { ticks: { display: false }, grid: { display: false } },
                    y: { grid: { color: 'rgba(255, 255, 255, 0.05)' }, ticks: { color: '#8b949e' } }
                },
                plugins: {
                    legend: {
                        labels: { color: '#8b949e' }
                    }
                }
            }
        });

        // 2. Fetch data every 1 second
        setInterval(function() {
            fetch('/get_data')
                .then(response => response.json())
                .then(data => {
                    // Update the Text
                    document.getElementById('meter-val').innerText = data.reading;
                    document.getElementById('gain-val').innerText = data.gain;

                    // Update the Chart
                    const now = new Date().toLocaleTimeString();
                    
                    // Add new data
                    liveChart.data.labels.push(now);
                    liveChart.data.datasets[0].data.push(data.gain);

                    // Keep only the last 15 readings so it "scrolls"
                    if(liveChart.data.labels.length > 15) {
                        liveChart.data.labels.shift();
                        liveChart.data.datasets[0].data.shift();
                    }

                    liveChart.update('none'); // Update without heavy animation
                });
        }, 1000);
    </script>
</body>
</html>
